<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F6F50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3FA34D;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" fill="#0B3D2E" rx="20" />
  <path d="M20 70 L50 30 L80 70 Z" fill="url(#grad1)" filter="url(#glow)"/>
  <path d="M50 20 Q 60 10, 70 20 Q 60 30, 50 20" fill="#F4F9F4" filter="url(#glow)"/>
</svg>
